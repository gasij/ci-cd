name: "01 - Тестирование"

on:
  pull_request:
    branches: [main, master, bash]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      # Обновлено: проверьте, вышла ли новая мажорная версия actions/checkout
      # Например, если есть @v5 или выше, используйте её для поддержки Node.js 24
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          echo "✅ All unit tests passed"

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    steps:
      # Обновлено: проверьте, вышла ли новая мажорная версия actions/checkout
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          echo "✅ All integration tests passed"

  add-test-label:
    name: "Добавить label test-passed"
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: success()
    steps:
      # Обновлено: actions/github-script@v7 уже должен поддерживать Node.js 24
      # но для уверенности проверьте последнюю версию в маркете
      - name: Add label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log(`Adding label to PR #${context.issue.number}`);
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['test-passed']
            });
            
            console.log('✅ Label test-passed added successfully');
  
  # Опционально: добавить проверку совместимости с Node.js 24
  test-node24-compatibility:
    name: "Проверка совместимости с Node.js 24"
    runs-on: ubuntu-latest
    if: false # Замените на true, если хотите протестировать
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Тестирование с принудительным использованием Node.js 24');
            console.log('✅ Если вы видите это сообщение, действия совместимы!');
