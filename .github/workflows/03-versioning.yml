name: "03 - Автоматическое обновление версии"

on:
  pull_request:
    branches: [main, master]
    types: [closed]
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Режим отладки'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump-version:
    name: "Обновление версии"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      old_version: ${{ steps.bump.outputs.old_version }}
      version_type: ${{ steps.bump.outputs.version_type }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: get_current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.1.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📌 Current version: $CURRENT_VERSION"

      - name: Determine version bump type
        id: get_type
        run: |
          COMMITS=$(git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --pretty=format:"%s" 2>/dev/null || echo "")
          
          if echo "$COMMITS" | grep -qiE "^(feat|feature):"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "version_type=minor" >> $GITHUB_OUTPUT
            echo "📊 Detected: minor version bump"
          elif echo "$COMMITS" | grep -qiE "^(fix|hotfix):"; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "version_type=patch" >> $GITHUB_OUTPUT
            echo "📊 Detected: patch version bump"
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "version_type=patch" >> $GITHUB_OUTPUT
            echo "📊 Detected: default patch version bump"
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.get_current.outputs.current_version }}"
          TYPE="${{ steps.get_type.outputs.type }}"
          
          if [ -z "$CURRENT" ]; then
            CURRENT="0.1.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-1}
          PATCH=${PATCH:-0}
          
          if [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "version_type=$TYPE" >> $GITHUB_OUTPUT
          echo "📦 Version updated: $CURRENT → $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          echo "📝 VERSION file updated to: $(cat VERSION)"

      # ПОЛНОСТЬЮ ИСПРАВЛЕНО: Надёжный пуш с retry и pull
      - name: Push changes safely
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add VERSION
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          # Создаем коммит
          git commit -m "chore(version): bump to ${{ steps.bump.outputs.new_version }}"
          
          # Сохраняем хеш коммита
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "✅ Local commit created: $COMMIT_HASH"
          
          # Максимальное количество попыток
          MAX_RETRIES=5
          RETRY=0
          PUSH_SUCCESS=false
          
          while [ $RETRY -lt $MAX_RETRIES ] && [ "$PUSH_SUCCESS" = false ]; do
            echo "🔄 Push attempt $((RETRY+1))/$MAX_RETRIES..."
            
            # Пытаемся запушить
            if git push origin main; then
              echo "✅ Push successful!"
              PUSH_SUCCESS=true
              break
            else
              echo "⚠️ Push failed, attempt $((RETRY+1))"
              
              # Проверяем, не изменился ли удаленный репозиторий
              echo "📡 Fetching remote changes..."
              git fetch origin main
              
              # Проверяем, есть ли новые коммиты
              REMOTE_COMMITS=$(git rev-list HEAD..origin/main --count)
              if [ "$REMOTE_COMMITS" -gt 0 ]; then
                echo "📥 Found $REMOTE_COMMITS new remote commit(s), pulling with rebase..."
                
                # Пытаемся сделать rebase
                if git pull --rebase origin main; then
                  echo "✅ Rebase successful"
                  
                  # Проверяем, не потеряли ли мы наш коммит
                  if ! git cat-file -e $COMMIT_HASH 2>/dev/null; then
                    echo "⚠️ Original commit was lost, but changes should be preserved"
                    # Получаем новый хеш последнего коммита
                    COMMIT_HASH=$(git rev-parse HEAD)
                  fi
                else
                  echo "❌ Rebase failed, aborting..."
                  git rebase --abort
                  
                  # Если rebase не удался, пробуем простой pull и merge
                  echo "🔄 Trying merge instead..."
                  git pull origin main --no-rebase
                  
                  # Восстанавливаем наш коммит, если он потерян
                  if ! git cat-file -e $COMMIT_HASH 2>/dev/null; then
                    echo "⚠️ Re-creating our commit..."
                    echo "${{ steps.bump.outputs.new_version }}" > VERSION
                    git add VERSION
                    git commit -m "chore(version): bump to ${{ steps.bump.outputs.new_version }}"
                    COMMIT_HASH=$(git rev-parse HEAD)
                  fi
                fi
              fi
              
              RETRY=$((RETRY+1))
              
              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "⏳ Waiting 5 seconds before retry..."
                sleep 5
              fi
            fi
          done
          
          if [ "$PUSH_SUCCESS" = false ]; then
            echo "❌ Failed to push after $MAX_RETRIES attempts"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  add-version-label:
    name: "Добавить label с версией"
    needs: bump-version
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && needs.bump-version.outputs.new_version != ''
    steps:
      - name: Add version label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ needs.bump-version.outputs.new_version }}';
            
            if (!newVersion) {
              console.log('❌ No version provided, skipping');
              return;
            }
            
            const labelName = `v${newVersion}`;
            console.log(`🏷️ Adding label: ${labelName}`);
            
            try {
              // Проверяем существование метки
              let labelExists = false;
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName
                });
                labelExists = true;
                console.log(`✅ Label ${labelName} already exists`);
              } catch (e) {
                console.log(`📝 Label ${labelName} does not exist, creating...`);
              }
              
              // Создаем метку, если её нет
              if (!labelExists) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '0e8a16',
                  description: `Version ${newVersion}`
                });
                console.log(`✅ Created label ${labelName}`);
              }
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              console.log(`✅ Successfully added label ${labelName}`);
            } catch (error) {
              console.log(`⚠️ Label error: ${error.message}`);
            }

  # Добавляем уведомление об успехе
  notify-success:
    name: "Уведомление об успехе"
    needs: [bump-version, add-version-label]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Success message
        run: |
          echo "🎉 Version update completed successfully!"
          echo "📦 New version: ${{ needs.bump-version.outputs.new_version }}"
          echo "📅 Node.js 20 deprecation: June 2nd, 2026"
          echo "🔗 More info: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/"
