name: "03 - Автоматическое обновление версии"

on:
  pull_request:
    branches: [main, master]
    types: [closed]
  workflow_dispatch:
    inputs:
      test_node24:
        description: 'Тестировать с Node.js 24'
        type: boolean
        default: false
      debug_mode:
        description: 'Режим отладки'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump-version:
    name: "Обновление версии"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      old_version: ${{ steps.bump.outputs.old_version }}
      version_type: ${{ steps.bump.outputs.version_type }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: get_current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.1.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump type
        id: get_type
        run: |
          COMMITS=$(git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --pretty=format:"%s" 2>/dev/null || echo "")
          
          if echo "$COMMITS" | grep -qiE "^(feat|feature):"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "version_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qiE "^(fix|hotfix):"; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "version_type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "version_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.get_current.outputs.current_version }}"
          TYPE="${{ steps.get_type.outputs.type }}"
          
          if [ -z "$CURRENT" ]; then
            CURRENT="0.1.0"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-1}
          PATCH=${PATCH:-0}
          
          if [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION

      # ИСПРАВЛЕНО: Безопасный пуш с pull --rebase
      - name: Commit and push new version safely
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add VERSION
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Создаем коммит
          git commit -m "[${{ steps.bump.outputs.new_version }}] <- [${{ steps.bump.outputs.old_version }}] up"
          
          # Сохраняем текущий коммит во временную переменную
          LOCAL_COMMIT=$(git rev-parse HEAD)
          echo "Local commit: $LOCAL_COMMIT"
          
          # Пытаемся запушить с retry логикой
          MAX_RETRIES=3
          RETRY=0
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Push attempt $((RETRY+1))/$MAX_RETRIES"
            
            # Пытаемся запушить
            if git push; then
              echo "✅ Push successful!"
              exit 0
            else
              echo "⚠️ Push failed, checking for remote changes..."
              RETRY=$((RETRY+1))
              
              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "Pulling latest changes with rebase..."
                git pull --rebase origin main
                
                # Проверяем, не потеряли ли мы наш коммит
                if ! git cat-file -e $LOCAL_COMMIT 2>/dev/null; then
                  echo "⚠️ Local commit was lost during rebase, recreating..."
                  # Наш коммит был потерян при rebase, нужно создать его заново
                  echo "${{ steps.bump.outputs.new_version }}" > VERSION
                  git add VERSION
                  git commit -m "[${{ steps.bump.outputs.new_version }}] <- [${{ steps.bump.outputs.old_version }}] up"
                  LOCAL_COMMIT=$(git rev-parse HEAD)
                fi
              fi
            fi
          done
          
          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Альтернативный вариант: использовать actions/github-script для пуша
  add-version-label:
    name: "Добавить label с версией"
    needs: bump-version
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && needs.bump-version.outputs.new_version != ''
    steps:
      - name: Add version label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ needs.bump-version.outputs.new_version }}';
            
            if (!newVersion) {
              console.log('No version provided, skipping');
              return;
            }
            
            const labelName = `v${newVersion}`;
            
            try {
              // Проверяем существование метки
              let labelExists = false;
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName
                });
                labelExists = true;
              } catch (e) {
                // Метка не существует
              }
              
              // Создаем метку, если её нет
              if (!labelExists) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '0e8a16',
                  description: `Version ${newVersion}`
                });
              }
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              console.log(`✅ Added label ${labelName}`);
            } catch (error) {
              console.log(`⚠️ Label error: ${error.message}`);
            }
